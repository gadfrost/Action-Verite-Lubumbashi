<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Action ou Vérité - Lubumbashi</title>
    <link rel="stylesheet" href="assets/style.css">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0f172a">
    <link rel="apple-touch-icon" href="assets/icon-192.png">
</head>
<body>
    <!-- Boutons flottants en haut à droite -->
    <div class="theme-toggle">
        <button id="themeBtn" class="btn-theme" title="Changer de thème">
            <span id="themeIcon">🌙</span>
        </button>
        <button id="downloadBtn" class="btn-theme" title="Télécharger l'application">
            <span>📥</span>
        </button>
    </div>

    <div class="container">
        <!-- Écran de sélection de difficulté -->
        <div id="difficultyScreen" class="screen active difficulty-screen">
            <!-- En-tête avec titre -->
            <div class="difficulty-header">
                <h1>Action ou Vérité</h1>
                <p class="subtitle">Sélectionnez un niveau</p>
            </div>

            <!-- Bouton d'installation PWA -->
            <button id="installBtn" class="btn-install" style="display: none;">
                <span>📲</span> Installer l'App
            </button>

            <!-- Grille de boutons de difficulté -->
            <div class="difficulty-buttons">
                <button class="btn btn-soft" onclick="selectDifficulty('soft')">
                    <span class="difficulty-icon">🌱</span>
                    <span class="difficulty-name">Soft</span>
                </button>
                <button class="btn btn-medium" onclick="selectDifficulty('medium')">
                    <span class="difficulty-icon">🔥</span>
                    <span class="difficulty-name">Medium</span>
                </button>
                <button class="btn btn-hard" onclick="selectDifficulty('hard')">
                    <span class="difficulty-icon">⚡</span>
                    <span class="difficulty-name">Hard</span>
                </button>
                <button class="btn btn-extreme" onclick="selectDifficulty('extreme')">
                    <span class="difficulty-icon">💀</span>
                    <span class="difficulty-name">Extreme</span>
                </button>
            </div>

            <!-- Section informative en bas -->
            <div class="difficulty-footer glass">
                <p class="footer-text">✨ Ambiance garantie • Prêt à relever des défis ?</p>
            </div>
        </div>

        <!-- Écran d'ajout de joueurs -->
        <div id="playersScreen" class="screen">
            <div class="glass">
                <h2>Les Joueurs</h2>
                <div class="players-input-section">
                    <input type="text" id="playerInput" placeholder="Nom..." onkeypress="handlePlayerKeyPress(event)">
                    <button class="btn btn-primary" style="width: auto; margin:0;" onclick="addPlayer()">OK</button>
                </div>
                <div class="players-list">
                    <ul id="playersList"></ul>
                </div>
            </div>
            <button class="btn btn-primary" id="startGameBtn" onclick="startGame()" disabled>Commencer la partie</button>
            <button class="btn btn-secondary" onclick="goBackToDifficulty()">Retour</button>
        </div>

        <!-- Écran principal du jeu -->
        <div id="gameScreen" class="screen">
            <div class="game-header">
                <div class="glass current-player">
                    <p style="font-size: 0.8rem; opacity: 0.7;">C'est à</p>
                    <h2 id="currentPlayerName" style="color: var(--primary-color);">---</h2>
                </div>
                <div class="glass next-player">
                    <p style="font-size: 0.7rem;">Suivant</p>
                    <p id="nextPlayerName">---</p>
                </div>
            </div>

            <div class="choice-buttons" id="choiceButtons">
                <button class="btn btn-choice btn-truth" onclick="selectChallenge('truth')">
                    <span class="choice-icon">🤔</span>
                    <span class="choice-text">Vérité</span>
                </button>
                <button class="btn btn-choice btn-action" onclick="selectChallenge('action')">
                    <span class="choice-icon">🎬</span>
                    <span class="choice-text">Action</span>
                </button>
            </div>

            <div id="challengeDisplay" class="glass challenge-display hidden" style="text-align: center; min-height: 150px; display: flex; flex-direction: column; justify-content: center; gap: 20px;">
                <div id="challengeType" style="font-weight: bold; color: var(--primary-color); text-transform: uppercase;"></div>
                <div id="challengeText" style="font-size: 1.1rem; line-height: 1.5;"></div>
                <button class="btn btn-primary" onclick="nextChallenge()">Défi relevé !</button>
            </div>
        </div>
    </div>

    <script src="assets/script.js"></script>
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js').catch(err => console.log("SW registration failed", err));
            });
        }
    </script>
</body>
</html>
