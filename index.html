<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Action ou Vérité - Moderne</title>
    <link rel="stylesheet" href="assets/style.css">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#6366f1">
    <link rel="apple-touch-icon" href="assets/icon-192.png">
</head>
<body>
    <!-- Commutateur de thème -->
    <div class="theme-toggle">
        <button id="themeBtn" class="btn-theme" title="Changer de mode">
            <span id="themeIcon">🌙</span>
        </button>
    </div>

    <div class="container">
        <!-- Écran de sélection de difficulté -->
        <div id="difficultyScreen" class="screen active">
            <h1>Action ou Vérité</h1>
            <p class="subtitle">Choisissez votre niveau de défi</p>
            
            <!-- Bouton d'installation amélioré -->
            <button id="installBtn" class="btn btn-install" style="display: none;">
                <span>📥</span> Télécharger l'application
            </button>

            <div class="difficulty-buttons">
                <button class="btn btn-soft" onclick="selectDifficulty('soft')">
                    <span class="difficulty-icon">🌱</span>
                    <span class="difficulty-name">Soft</span>
                </button>
                <button class="btn btn-medium" onclick="selectDifficulty('medium')">
                    <span class="difficulty-icon">🔥</span>
                    <span class="difficulty-name">Medium</span>
                </button>
                <button class="btn btn-hard" onclick="selectDifficulty('hard')">
                    <span class="difficulty-icon">⚡</span>
                    <span class="difficulty-name">Hard</span>
                </button>
                <button class="btn btn-extreme" onclick="selectDifficulty('extreme')">
                    <span class="difficulty-icon">💀</span>
                    <span class="difficulty-name">Extreme</span>
                </button>
            </div>
        </div>

        <!-- Écran d'ajout de joueurs -->
        <div id="playersScreen" class="screen">
            <h2>Les Joueurs</h2>
            <div class="players-input-section">
                <input type="text" id="playerInput" placeholder="Nom du joueur..." onkeypress="handlePlayerKeyPress(event)">
                <button class="btn btn-primary" onclick="addPlayer()">Ajouter</button>
            </div>
            
            <div class="players-list glass">
                <h3>Joueurs (<span id="playersCount">0</span>)</h3>
                <ul id="playersList"></ul>
            </div>

            <div class="action-buttons">
                <button class="btn btn-secondary" onclick="goBackToDifficulty()">Retour</button>
                <button class="btn btn-primary" id="startGameBtn" onclick="startGame()" disabled>Commencer</button>
            </div>
        </div>

        <!-- Écran principal du jeu -->
        <div id="gameScreen" class="screen">
            <div class="game-header">
                <div class="current-player glass">
                    <p class="label">C'est à toi</p>
                    <h2 id="currentPlayerName"></h2>
                </div>
                <div class="next-player glass">
                    <p class="label">Ensuite</p>
                    <p id="nextPlayerName"></p>
                </div>
            </div>

            <div class="game-content glass">
                <div class="challenge-section">
                    <div class="choice-buttons">
                        <button class="btn btn-choice btn-truth" onclick="selectChallenge('truth')">
                            <span class="choice-icon">🤔</span>
                            <span class="choice-text">Vérité</span>
                        </button>
                        <button class="btn btn-choice btn-action" onclick="selectChallenge('action')">
                            <span class="choice-icon">🎬</span>
                            <span class="choice-text">Action</span>
                        </button>
                    </div>

                    <div id="challengeDisplay" class="challenge-display glass hidden">
                        <div class="challenge-type" id="challengeType"></div>
                        <div class="challenge-text" id="challengeText"></div>
                        <button class="btn btn-primary" onclick="nextChallenge()">Suivant</button>
                    </div>
                </div>
            </div>

            <div class="game-footer">
                <button class="btn btn-secondary" onclick="resetGame()">Quitter</button>
            </div>
        </div>

        <!-- Écran de fin de tour -->
        <div id="roundEndScreen" class="screen">
            <div class="glass" style="padding: 40px; border-radius: 24px; text-align: center;">
                <h2>Fin de tour !</h2>
                <p>Tout le monde a relevé un défi.</p>
                <div class="action-buttons">
                    <button class="btn btn-primary" onclick="restartWithSameOrder()">Continuer</button>
                    <button class="btn btn-secondary" onclick="reshufflePlayers()">Mélanger</button>
                </div>
            </div>
        </div>
    </div>

    <script src="assets/script.js"></script>
</body>
</html>
